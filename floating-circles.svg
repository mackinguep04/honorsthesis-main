<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sageGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#88a751;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#b2d07d;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="rustGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a4502f;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#c96a4f;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="mossGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b2d07d;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#88a751;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="creamGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6e8cd;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#f0eee4;stop-opacity:0.15" />
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="120" cy="150" r="80" fill="url(#sageGradient)" class="float-circle"/>
  <circle cx="650" cy="100" r="120" fill="url(#mossGradient)" class="float-circle" style="animation-delay: 1s;"/>
  <circle cx="720" cy="450" r="90" fill="url(#rustGradient)" class="float-circle" style="animation-delay: 2s;"/>
  <circle cx="80" cy="480" r="60" fill="url(#creamGradient)" class="float-circle" style="animation-delay: 0.5s;"/>
  <circle cx="200" cy="80" r="45" fill="url(#mossGradient)" class="float-circle" style="animation-delay: 1.5s;"/>
  <circle cx="550" cy="520" r="55" fill="url(#sageGradient)" class="float-circle" style="animation-delay: 2.5s;"/>
  <circle cx="350" cy="200" r="25" fill="#88a751" fill-opacity="0.3" filter="url(#softGlow)" class="pulse-circle"/>
  <circle cx="450" cy="400" r="18" fill="#a4502f" fill-opacity="0.25" filter="url(#softGlow)" class="pulse-circle" style="animation-delay: 1s;"/>
  <circle cx="180" cy="350" r="30" fill="#b2d07d" fill-opacity="0.35" filter="url(#softGlow)" class="pulse-circle" style="animation-delay: 0.7s;"/>
  <circle cx="600" cy="250" r="22" fill="#88a751" fill-opacity="0.3" filter="url(#softGlow)" class="pulse-circle" style="animation-delay: 1.3s;"/>
  <circle cx="280" cy="120" r="8" fill="#6c4d2e" fill-opacity="0.2"/>
  <circle cx="380" cy="520" r="6" fill="#a4502f" fill-opacity="0.25"/>
  <circle cx="520" cy="180" r="10" fill="#88a751" fill-opacity="0.2"/>
  <circle cx="650" cy="350" r="7" fill="#b2d07d" fill-opacity="0.3"/>
  <circle cx="150" cy="250" r="5" fill="#6c4d2e" fill-opacity="0.2"/>
  <circle cx="480" cy="300" r="9" fill="#a4502f" fill-opacity="0.2"/>
</svg>
